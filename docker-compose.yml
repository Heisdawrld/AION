# AION Local Development Database
# Run: docker compose up -d
# Stop: docker compose down
# Reset: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: aion-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aion
      POSTGRES_PASSWORD: aion_dev
      POSTGRES_DB: aion_dev
    volumes:
      - aion-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aion -d aion_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aion-pgdata:

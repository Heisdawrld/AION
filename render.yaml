# AION — Render Deployment Configuration
# Uses Turso for database (no Render PostgreSQL needed)
#
# HOW TO DEPLOY:
# 1. Create a Turso database: turso db create aion
# 2. Get the URL: turso db show aion --url
# 3. Get the auth token: turso db tokens create aion
# 4. Go to https://dashboard.render.com
# 5. Create a new Web Service connected to Heisdawrld/AION
# 6. Set environment variables (see below)
# 7. Deploy!
#
# HYBRID BRAIN ARCHITECTURE:
# Different agents use different models based on task complexity.
# CTO/Business → Heavy model (Gemini Flash or Llama 70B)
# Coders       → Medium model (Llama 70B on Groq)
# Reviewers    → Light model (Llama 8B or Flash-Lite)

services:
  - type: web
    name: aion
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      # --- Database (Turso) ---
      - key: DATABASE_URL
        sync: false  # libsql://aion-xxxx.turso.io
      - key: DATABASE_AUTH_TOKEN
        sync: false  # Turso auth token
      # --- API Authentication ---
      - key: AION_API_KEY
        sync: false  # Generate with: openssl rand -hex 32
      - key: NEXT_PUBLIC_AION_API_KEY
        sync: false  # Same value as AION_API_KEY (needed by browser)
      # --- AI: Medium tier (default — coders, general tasks) ---
      - key: OPENAI_API_KEY
        sync: false  # Groq key: gsk_...
      - key: OPENAI_BASE_URL
        sync: false  # https://api.groq.com/openai/v1
      - key: OPENAI_MODEL
        sync: false  # llama-3.3-70b-versatile
      # --- AI: Heavy tier (CTO, Business Strategist) ---
      - key: OPENAI_HEAVY_API_KEY
        sync: false  # Optional: separate key for heavy model
      - key: OPENAI_HEAVY_BASE_URL
        sync: false  # Optional: e.g. https://generativelanguage.googleapis.com/v1beta/openai
      - key: OPENAI_HEAVY_MODEL
        sync: false  # Optional: e.g. gemini-2.0-flash
      # --- AI: Light tier (QA, Security, Reviewers) ---
      - key: OPENAI_LIGHT_API_KEY
        sync: false  # Optional: separate key for light model
      - key: OPENAI_LIGHT_BASE_URL
        sync: false  # Optional: e.g. https://api.groq.com/openai/v1
      - key: OPENAI_LIGHT_MODEL
        sync: false  # Optional: e.g. llama-3.1-8b-instant
    healthCheckPath: /api/health

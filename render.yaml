# AION — Render Deployment Configuration
# Uses Turso for database (no Render PostgreSQL needed)
#
# HOW TO DEPLOY:
# 1. Create a Turso database: turso db create aion
# 2. Get the URL: turso db show aion --url
# 3. Get the auth token: turso db tokens create aion
# 4. Go to https://dashboard.render.com
# 5. Create a new Web Service connected to Heisdawrld/AION
# 6. Set environment variables (see below)
# 7. Deploy!
#
# MULTI-PROVIDER AI ROUTER:
# Add as many free API keys as you can — the router pools them all!
# More keys = more capacity = fewer rate limits.
#
# Free providers:
#   - Groq:      https://console.groq.com/keys         (llama-3.3-70b, 30 RPM)
#   - Gemini:    https://aistudio.google.com/apikey     (gemini-2.0-flash, 15 RPM)
#   - Cerebras:  https://cloud.cerebras.ai/             (llama-3.3-70b, free)
#   - Sambanova: https://cloud.sambanova.ai/            (llama-3.3-70b, free)

services:
  - type: web
    name: aion
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      # --- Database (Turso) ---
      - key: DATABASE_URL
        sync: false  # libsql://aion-xxxx.turso.io
      - key: DATABASE_AUTH_TOKEN
        sync: false  # Turso auth token
      # --- API Authentication ---
      - key: AION_API_KEY
        sync: false  # Generate with: openssl rand -hex 32
      - key: NEXT_PUBLIC_AION_API_KEY
        sync: false  # Same value as AION_API_KEY (needed by browser)
      # --- AI Providers (add as many as you can!) ---
      # Groq (free — 30 RPM, fast inference)
      - key: GROQ_API_KEY
        sync: false  # gsk_...
      # Google Gemini (free — 15 RPM, best reasoning)
      - key: GEMINI_API_KEY
        sync: false  # AIza...
      # Cerebras (free — ultra-fast inference)
      - key: CEREBRAS_API_KEY
        sync: false  # csj-...
      # Sambanova (free — ultra-fast inference)
      - key: SAMBANOVA_API_KEY
        sync: false  # sna-...
      # OpenRouter (has free models)
      - key: OPENROUTER_API_KEY
        sync: false  # sk-or-...
      # --- Legacy single-provider (still works) ---
      - key: OPENAI_API_KEY
        sync: false  # Any OpenAI-compatible key
      - key: OPENAI_BASE_URL
        sync: false  # Optional: custom endpoint
      - key: OPENAI_MODEL
        sync: false  # Optional: custom model name
    healthCheckPath: /api/health

# AION — Render Deployment Configuration
# Uses Turso for database (no Render PostgreSQL needed)
#
# HOW TO DEPLOY:
# 1. Create a Turso database: turso db create aion
# 2. Get the URL: turso db show aion --url
# 3. Get the auth token: turso db tokens create aion
# 4. Go to https://dashboard.render.com
# 5. Create a new Web Service connected to Heisdawrld/AION
# 6. Set environment variables (see below)
# 7. Deploy!

services:
  - type: web
    name: aion
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      # --- Database (Turso) ---
      - key: DATABASE_URL
        sync: false  # Turso URL: libsql://aion-xxxx.turso.io
      - key: DATABASE_AUTH_TOKEN
        sync: false  # Turso auth token
      # --- API Authentication ---
      - key: AION_API_KEY
        sync: false  # Generate with: openssl rand -hex 32
      - key: NEXT_PUBLIC_AION_API_KEY
        sync: false  # Same value as AION_API_KEY (needed by the browser)
      # --- AI Provider: OpenAI (recommended for Render) ---
      - key: OPENAI_API_KEY
        sync: false  # Your OpenAI API key (sk-...)
      - key: OPENAI_BASE_URL
        sync: false  # Optional: custom OpenAI-compatible endpoint
      - key: OPENAI_MODEL
        sync: false  # Optional: model name (default: gpt-4o-mini)
      # --- AI Provider: z-ai-web-dev-sdk (only works inside Z.ai) ---
      - key: ZAI_BASE_URL
        sync: false
      - key: ZAI_API_KEY
        sync: false
      - key: ZAI_TOKEN
        sync: false
      - key: ZAI_CHAT_ID
        sync: false
      - key: ZAI_USER_ID
        sync: false
    healthCheckPath: /api/health
